  <style>
    .image-wrapper {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
      /* Ensures the wave doesn't bleed out */
    }

    .bg-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .wave-svg-bottom {
      position: absolute;
      bottom: -1px;
      /* Attached to the bottom */
      left: 0;
      width: 100%;
      height: 120px;
      /* Adjust height for 'drastic' feel */
      z-index: 10;
    }
  </style>
</head>
