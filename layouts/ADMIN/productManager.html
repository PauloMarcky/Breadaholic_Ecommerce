<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Production Management</title>
  <link rel="stylesheet" href="productManger.css">
</head>

<body>

  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 class="logo">Breadaholic</h2>
      <ul>
        <li class="active">Product Management</li>
        <li>Order Manager</li>
        <li>Sales Reports</li>
        <li>Users</li>
        <li class="logout">Log Out</li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <header>
        <h1>Production Management</h1>
      </header>

      <!-- Cards -->
      <section class="cards">
        <div class="card">
          <h3>Out of Stock</h3>
          <p class="big">4</p>
          <span>Unavailable</span>
        </div>

        <div class="card">
          <h3>Products</h3>
          <p class="big">69</p>
          <span>Total</span>
        </div>

        <div class="card">
          <h3>Latest Products</h3>
          <p class="big">6</p>
          <span>Recent Added</span>
        </div>
      </section>

      <!-- Table -->
      <section class="table-section">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Last Update</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><img src="https://via.placeholder.com/60"></td>
              <td>Product A</td>
              <td>₱150</td>
              <td>10</td>
              <td>30/6/25</td>
              <td>
                <button class="edit">✏️</button>
                <button class="delete">🗑️</button>
              </td>
            </tr>
          </tbody>
        </table>

        <button class="add-btn">Add New Product</button>
      </section>

    </main>
  </div>

  <!-- Modal (Add/Edit Product) -->
  <div class="modal">
    <div class="modal-content">
      <div class="image-box">ADD IMAGE</div>

      <div class="form">
        <input type="text" placeholder="Product Name" value="Product A">
        <input type="number" placeholder="Price" value="150">
        <input type="number" placeholder="Stock" value="10">

        <select>
          <option>Pastries</option>
          <option>Coffee</option>
        </select>

        <div class="modal-actions">
          <button class="primary">Save</button>
          <button class="secondary">Cancel</button>
        </div>
      </div>
    </div>
  </div>

</body>

</html>
