<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="contactInfo.css">
</head>

<body>
  <header class="nav-wrapper">
    <nav>
      <div class="logo-header-container">
        <img src="/images/business-logo.png" alt="Logo" />
      </div>

      <div class="nav-link-container">
        <a>Home</a>
        <a>Menu</a>
        <a class="active">Talk to us</a>
        <a>Locations</a>
      </div>

      <div class="nav-right-side">
        <div class="searching-container">
          <input type="text" placeholder="Search" />
          <button class="search-button">
            <img src="/images/search-icon.png" alt="Search" />
          </button>
        </div>

        <div class="menu">
          <button class="menu-button">
            <img src="/images/cart-icon.png" alt="Cart" />
          </button>
          <p>Basket</p>
        </div>

        <div class="profile">
          <button class="profile-button">
            <img src="/images/profile-icon.png" alt="Profile" />
          </button>
          <p>Profile</p>
        </div>
      </div>
    </nav>
  </header>
  <div class="body-main">
    <div class="contacts-left">
      <div class="header">
        <h2>GET IN TOUCH WITH US</h2>
        <p>Need help? Fill out the form and message us!</p>
      </div>
      <div class="contacts-container">
        <div class="contact-info">
          <div class="header-con">
            <img src="/images/loc.png" alt="">
            <p>Main Location</p>
          </div>
          <p class="value">Nightmarket Santiago, Santiago, Philippines, 3311</p>
        </div>
        <div class="contact-info">
          <div class="header-con">
            <img src="/images/tele.png" alt="">
            <p>Phone Number</p>
          </div>
          <p class="value">12345678910</p>
        </div>
      </div>
      <hr>
      <img src="/images/fb.png" alt="">
      <img src="/images/ig.png" alt="">
      <img src="/images/mess.png" alt="">
    </div>
  </div>
  </div>
</body>

</html>
