<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breadaholic – Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brown: #8B4A00;
      --brown-dark: #6B3800;
      --brown-light: #A85C00;
      --gold: #D4960A;
      --gold-light: #F0B429;
      --cream: #FFF8EE;
      --card-bg: #FEFEFE;
      --text-dark: #2C1A00;
      --text-mid: #5A3D1A;
      --border: #D4B896;
      --nav-active: #3A7ABF;
      --sidebar-w: 300px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--brown);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: var(--brown-dark);
      padding: 0 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 76px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.35);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-oval {
      background: var(--gold-light);
      border-radius: 50%;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 6px;
      border: 2px solid #fff;
    }

    .logo-oval span.brand {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 900;
      color: var(--brown-dark);
      line-height: 1;
      letter-spacing: -0.3px;
    }

    .logo-oval span.tagline {
      font-size: 6px;
      color: var(--brown-dark);
      text-align: center;
      line-height: 1.2;
    }

    .nav-links {
      display: flex;
      gap: 0;
      background: #c8d8e8;
      border-radius: 4px;
      overflow: hidden;
      margin-left: 8px;
    }

    .nav-links a {
      padding: 10px 28px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: var(--brown-dark);
      background: #c8d8e8;
      transition: background 0.2s;
    }

    .nav-links a.active {
      background: var(--nav-active);
      color: #fff;
    }

    .nav-links a:hover:not(.active) {
      background: #b0c4d8;
    }

    .search-bar {
      margin-left: auto;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      width: 220px;
      height: 34px;
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      color: var(--text-dark);
    }

    .search-bar button {
      background: none;
      border: none;
      padding: 0 10px;
      cursor: pointer;
      color: #888;
    }

    .search-bar svg {
      width: 16px;
      height: 16px;
    }

    .nav-icons {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .nav-icons button {
      background: none;
      border: none;
      cursor: pointer;
      color: #fff;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .nav-icons button:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .nav-icons svg {
      width: 22px;
      height: 22px;
    }

    /* ── PAGE LAYOUT ── */
    .page-body {
      display: flex;
      flex: 1;
      gap: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      padding: 36px 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .sidebar-headline {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .sidebar-section h3 {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      list-style: none;
    }

    .category-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .category-list li input[type="radio"] {
      accent-color: var(--gold-light);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .category-list li label {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .sort-select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 4px;
      border: none;
      background: var(--brown-dark);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
    }

    /* Price Range Slider */
    .price-slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .price-labels {
      display: flex;
      justify-content: space-between;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold-light);
      cursor: pointer;
    }

    /* ── MAIN GRID ── */
    .main-content {
      flex: 1;
      padding: 28px 28px 40px 20px;
      overflow-y: auto;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .product-card {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
    }

    .product-card:hover {
      box-shadow: 0 6px 22px rgba(139, 74, 0, 0.3);
      transform: translateY(-3px);
      border-color: var(--gold-light);
    }

    .product-card.selected {
      border-color: var(--gold-light);
      box-shadow: 0 0 0 3px var(--gold-light), 0 6px 22px rgba(139, 74, 0, 0.3);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
    }

    .card-placeholder {
      width: 100%;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #f5ddb0, #e8c47a);
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 8px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .btn-add {
      flex: 1;
      background: var(--brown-light);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 0;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover {
      background: var(--brown-dark);
    }

    .qty-input {
      width: 40px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 5px 4px;
      text-align: center;
      font-size: 12px;
      font-family: 'Nunito', sans-serif;
      color: var(--text-dark);
      background: #fff;
    }

    /* ── DETAIL PANEL ── */
    .detail-panel {
      width: 310px;
      flex-shrink: 0;
      background: #fff;
      border-left: 3px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .panel-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      line-height: 1;
      color: var(--text-mid);
      cursor: pointer;
      z-index: 10;
      transition: color 0.2s;
    }

    .panel-close:hover {
      color: var(--brown);
    }

    .panel-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: linear-gradient(135deg, #f5ddb0, #e8c47a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      flex-shrink: 0;
    }

    .panel-body {
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      overflow-y: auto;
    }

    .panel-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 900;
      color: var(--text-dark);
      text-transform: uppercase;
    }

    .panel-price {
      font-size: 20px;
      font-weight: 800;
      color: var(--brown-light);
    }

    .panel-section-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-dark);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .ingredients-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding-left: 4px;
    }

    .ingredients-list li {
      font-size: 13px;
      color: var(--text-mid);
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .ingredients-list li::before {
      content: '·';
      color: var(--brown-light);
      font-size: 20px;
      line-height: 1;
      flex-shrink: 0;
    }

    .panel-footer {
      margin-top: auto;
      padding: 14px 20px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
      background: #fff;
    }

    .btn-cart {
      flex: 1;
      background: var(--brown-light);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 13px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-cart:hover {
      background: var(--brown-dark);
      transform: translateY(-1px);
    }

    .qty-cart {
      width: 50px;
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 10px 4px;
      text-align: center;
      font-size: 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      color: var(--text-dark);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(139, 74, 0, 0.3);
      border-radius: 3px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .products-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 860px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .detail-panel {
        position: fixed;
        top: 76px;
        right: 0;
        height: calc(100vh - 76px);
        z-index: 150;
        box-shadow: -6px 0 24px rgba(0, 0, 0, 0.3);
      }
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 16px;
        gap: 16px;
      }

      .page-body {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <!-- ══════════════ NAVBAR ══════════════ -->
  <nav class="navbar">
    <a class="logo" href="index.html">
      <div class="logo-oval">
        <span class="brand">Bread<br>aholic</span>
        <span class="tagline">Coffee Bread &<br>Pastries</span>
      </div>
    </a>

    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="menu.html" class="active">Menu</a>
      <a href="#">Talk To Us</a>
      <a href="#">Locations</a>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="search" oninput="filterProducts()">
      <button>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </button>
    </div>

    <div class="nav-icons">
      <button title="Menu Grid">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
      </button>
      <button title="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- ══════════════ PAGE BODY ══════════════ -->
  <div class="page-body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <h1 class="sidebar-headline">Choose<br>With<br>Your<br>Heart</h1>

      <div class="sidebar-section">
        <h3>Category Menus</h3>
        <ul class="category-list" id="categoryList">
          <li><input type="radio" name="cat" id="cat-all" value="all" checked onchange="filterProducts()"><label
              for="cat-all">All Items</label></li>
          <li><input type="radio" name="cat" id="cat-bread" value="bread" onchange="filterProducts()"><label
              for="cat-bread">Breads</label></li>
          <li><input type="radio" name="cat" id="cat-pastry" value="pastry" onchange="filterProducts()"><label
              for="cat-pastry">Pastries</label></li>
          <li><input type="radio" name="cat" id="cat-coffee" value="coffee" onchange="filterProducts()"><label
              for="cat-coffee">Coffee</label></li>
          <li><input type="radio" name="cat" id="cat-special" value="special" onchange="filterProducts()"><label
              for="cat-special">Specials</label></li>
        </ul>
      </div>

      <div class="sidebar-section">
        <h3>Sort By</h3>
        <select class="sort-select" id="sortSelect" onchange="filterProducts()">
          <option value="newest">Sorted By: Newest</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name: A–Z</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3>Price Range</h3>
        <div class="price-slider-wrap">
          <input type="range" id="priceRange" min="0" max="1000" value="1000" step="50"
            oninput="updatePrice(this.value); filterProducts()">
          <div class="price-labels">
            <span>₱0</span>
            <span id="priceLabel">₱1000</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── PRODUCT GRID ── -->
    <main class="main-content">
      <div class="products-grid" id="productsGrid">
        <!-- injected by JS -->
      </div>
    </main>

    <!-- ── DETAIL PANEL ── -->
    <aside class="detail-panel" id="detailPanel">
      <button class="panel-close" onclick="closePanel()" title="Close">&#x2715;</button>

      <div class="panel-img" id="panelImg">🥐</div>

      <div class="panel-body">
        <div class="panel-name" id="panelName">PRODUCT NAME</div>
        <div class="panel-price" id="panelPrice">₱0</div>
        <div class="panel-section-title">Ingredients</div>
        <ul class="ingredients-list" id="panelIngredients">
          <li>Loading…</li>
        </ul>
      </div>

      <div class="panel-footer">
        <button class="btn-cart" onclick="addToCart()">Add to Cart</button>
        <input class="qty-cart" type="number" id="panelQty" value="1" min="1">
      </div>
    </aside>

  </div><!-- end page-body -->

  <script>
    /* ══ DATA ══ */
    const products = [
      { id: 1, name: 'Pan de Sal', emoji: '🥖', category: 'bread', price: 35, ingredients: ['2 cups bread flour', '1 tsp instant yeast', '1 tbsp sugar', '½ tsp salt', '¾ cup warm water', '2 tbsp butter'] },
      { id: 2, name: 'Ensaymada', emoji: '🥐', category: 'pastry', price: 55, ingredients: ['3 cups all-purpose flour', '¼ cup sugar', '1 tsp instant yeast', '½ cup warm milk', '3 eggs', '⅓ cup softened butter', 'Grated cheese & sugar topping'] },
      { id: 3, name: 'Lotus Biscoff Cake', emoji: '🎂', category: 'special', price: 380, ingredients: ['2 cups cake flour', '1 cup sugar', '3 eggs', '1 cup butter', 'Lotus Biscoff spread', '1 cup cream cheese', 'Biscoff crumbs for garnish'] },
      { id: 4, name: 'Ube Pandesal', emoji: '🟣', category: 'bread', price: 45, ingredients: ['2 cups flour', '½ cup ube halaya', '1 tsp yeast', '2 tbsp sugar', '1 egg', '½ cup warm milk', '2 tbsp butter'] },
      { id: 5, name: 'Egg Tart', emoji: '🥧', category: 'pastry', price: 65, ingredients: ['1 cup flour', '½ cup butter', '¼ cup sugar', '3 egg yolks', '1 cup fresh milk', '¼ cup condensed milk', 'Pinch of salt'] },
      { id: 6, name: 'Cheese Roll', emoji: '🧆', category: 'bread', price: 40, ingredients: ['2 cups flour', '1 tbsp sugar', '1 tsp yeast', '½ tsp salt', '¾ cup milk', '2 tbsp butter', 'Cheddar cheese filling'] },
      { id: 7, name: 'Caramel Latte', emoji: '☕', category: 'coffee', price: 120, ingredients: ['2 shots espresso', '200ml fresh milk', '2 tbsp caramel syrup', 'Ice or steamed milk'] },
      { id: 8, name: 'Chocolate Donut', emoji: '🍩', category: 'pastry', price: 75, ingredients: ['2 cups flour', '¼ cup cocoa powder', '½ cup sugar', '2 eggs', '¼ cup butter', '1 tsp baking powder', 'Chocolate glaze'] },
      { id: 9, name: 'Spanish Bread', emoji: '🥐', category: 'bread', price: 30, ingredients: ['2 cups flour', '¼ cup sugar', '1 tsp yeast', '⅓ cup warm milk', '2 eggs', '¼ cup butter', 'Brown sugar & margarine filling'] },
      { id: 10, name: 'Red Velvet Cake', emoji: '🎂', category: 'special', price: 420, ingredients: ['2½ cups cake flour', '1½ cups sugar', '1 tsp baking soda', '1 tsp cocoa', '2 eggs', '1 cup buttermilk', '2 tbsp red food dye', 'Cream cheese frosting'] },
      { id: 11, name: 'Iced Americano', emoji: '☕', category: 'coffee', price: 95, ingredients: ['2 shots espresso', '200ml cold water', 'Ice cubes', 'Optional: simple syrup'] },
      { id: 12, name: 'Butter Croissant', emoji: '🥐', category: 'pastry', price: 85, ingredients: ['3 cups bread flour', '2 tbsp sugar', '1 tsp salt', '2 tsp yeast', '1 cup warm milk', '250g cold butter for lamination'] },
    ];

    let selectedId = null;

    /* ══ RENDER ══ */
    function renderGrid(list) {
      const grid = document.getElementById('productsGrid');
      if (list.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1;color:#fff;font-size:16px;padding:20px 0;text-align:center;">No products found.</p>`;
        return;
      }
      grid.innerHTML = list.map(p => `
      <div class="product-card ${selectedId === p.id ? 'selected' : ''}"
           onclick="openPanel(${p.id})" id="card-${p.id}">
        <div class="card-placeholder">${p.emoji}</div>
        <div class="card-footer">
          <button class="btn-add" onclick="event.stopPropagation(); quickAdd(${p.id})">Add to Menu</button>
          <input class="qty-input" type="number" value="1" min="1"
                 onclick="event.stopPropagation()" id="qty-${p.id}">
        </div>
      </div>
    `).join('');
    }

    function filterProducts() {
      const cat = document.querySelector('input[name="cat"]:checked').value;
      const sort = document.getElementById('sortSelect').value;
      const maxP = parseInt(document.getElementById('priceRange').value);
      const search = document.getElementById('searchInput').value.trim().toLowerCase();

      let list = products.filter(p => {
        const matchCat = cat === 'all' || p.category === cat;
        const matchPrice = p.price <= maxP;
        const matchSearch = p.name.toLowerCase().includes(search);
        return matchCat && matchPrice && matchSearch;
      });

      if (sort === 'price-asc') list.sort((a, b) => a.price - b.price);
      if (sort === 'price-desc') list.sort((a, b) => b.price - a.price);
      if (sort === 'name') list.sort((a, b) => a.name.localeCompare(b.name));

      renderGrid(list);
    }

    function updatePrice(val) {
      document.getElementById('priceLabel').textContent = '₱' + val;
    }

    /* ══ PANEL ══ */
    function openPanel(id) {
      const p = products.find(x => x.id === id);
      if (!p) return;
      selectedId = id;

      document.getElementById('panelImg').textContent = p.emoji;
      document.getElementById('panelName').textContent = p.name.toUpperCase();
      document.getElementById('panelPrice').textContent = '₱' + p.price.toFixed(2);
      document.getElementById('panelIngredients').innerHTML =
        p.ingredients.map(i => `<li>${i}</li>`).join('');
      document.getElementById('panelQty').value = 1;

      document.getElementById('detailPanel').classList.add('open');

      // highlight selected card
      document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById('card-' + id);
      if (card) card.classList.add('selected');
    }

    function closePanel() {
      document.getElementById('detailPanel').classList.remove('open');
      selectedId = null;
      document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
    }

    function addToCart() {
      const p = products.find(x => x.id === selectedId);
      const qty = parseInt(document.getElementById('panelQty').value) || 1;
      if (!p) return;
      alert(`✅ Added ${qty}× ${p.name} to your cart!`);
    }

    function quickAdd(id) {
      const p = products.find(x => x.id === id);
      const qty = parseInt(document.getElementById('qty-' + id)?.value) || 1;
      if (!p) return;
      alert(`✅ Added ${qty}× ${p.name} to your cart!`);
    }

    /* ══ INIT ══ */
    filterProducts();
  </script>
</body>

</html>
